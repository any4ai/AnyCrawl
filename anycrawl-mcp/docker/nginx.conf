# PID file location
pid /tmp/nginx.pid;

events {}
http {
  upstream app_mcp { server 127.0.0.1:3000; }
  upstream app_sse { server 127.0.0.1:3001; }
  gzip off;

  server {
    listen 80;

    location = / {
      default_type application/json;
      return 200 '{"status":"ok","service":"anycrawl-mcp","endpoints":["/{API_KEY}/mcp","/{API_KEY}/sse","/health"]}';
    }

    # Map /{API_KEY}/sse -> /sse (SSE upstream)
    location ~ ^/(?<apikey>[^/]+)/sse$ {
      if ($request_method = HEAD) { return 200; }

      proxy_set_header x-anycrawl-api-key $apikey;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_buffering off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;

      rewrite ^/.*/sse$ /sse break;
      proxy_pass http://app_sse;
    }

    # Map /{API_KEY}/mcp -> /mcp (MCP upstream)
    location ~ ^/(?<apikey>[^/]+)/mcp$ {
      if ($request_method = HEAD) { return 200; }

      proxy_set_header x-anycrawl-api-key $apikey;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_buffering off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;

      rewrite ^/.*/mcp$ /mcp break;
      proxy_pass http://app_mcp;
    }

    # Map /{API_KEY}/messages -> /messages (SSE upstream)
    location ~ ^/(?<apikey>[^/]+)/messages$ {
      if ($request_method = HEAD) { return 200; }

      proxy_set_header x-anycrawl-api-key $apikey;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      chunked_transfer_encoding off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;
      proxy_set_header Connection "";

      rewrite ^/.*/messages$ /messages break;
      proxy_pass http://app_sse;
    }

    location /mcp {
      if ($request_method = HEAD) { return 200; }

      proxy_buffering off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;
      proxy_pass http://app_mcp/mcp;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /messages {
      if ($request_method = HEAD) { return 200; }

      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      chunked_transfer_encoding off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://app_sse/messages;
    }

    location /sse {
      if ($request_method = HEAD) { return 200; }

      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      chunked_transfer_encoding off;
      proxy_read_timeout 620s;
      proxy_send_timeout 620s;
      proxy_set_header Connection "";
      proxy_set_header Accept "text/event-stream";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://app_sse/sse;
    }

    location /health {
      if ($request_method = HEAD) { return 200; }

      proxy_buffering off;
      proxy_read_timeout 5s;
      proxy_send_timeout 5s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://app_mcp/health;
    }

    location /health_mcp {
      if ($request_method = HEAD) { return 200; }

      proxy_buffering off;
      proxy_read_timeout 5s;
      proxy_send_timeout 5s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://app_mcp/health;
    }

    location /health_sse {
      if ($request_method = HEAD) { return 200; }

      proxy_buffering off;
      proxy_read_timeout 5s;
      proxy_send_timeout 5s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://app_sse/health;
    }
  }
}
